<div class="card area-card shadow-sm border-0 rounded-4">
    <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="d-flex align-items-center gap-2">
                <p class="fw-bold mb-0 text-{{ theme }}">{{ area.name }}</p>

                <button
                    class="btn btn-sm p-0 text-muted shadow-none"
                    onclick="openEditAreaModal('{{ area.id }}', '{{ area.name }}', '{{ area.position }}')"
                >
                    <i
                        class="bi bi-pencil-square"
                        style="font-size: 0.85rem"
                    ></i>
                </button>

                <form
                    action="{% url 'manning:delete_area' area.id %}"
                    method="POST"
                    class="d-inline"
                    onsubmit="return confirm('이 구역을 삭제하시겠습니까?');"
                >
                    {% csrf_token %}
                    <button
                        type="submit"
                        class="btn btn-sm p-0 text-danger shadow-none ms-1"
                    >
                        <i class="bi bi-trash3" style="font-size: 0.85rem"></i>
                    </button>
                </form>
            </div>
            <span class="badge bg-light text-dark border"
                >{{ area.manning_set.count }}명</span
            >
        </div>

        <div class="manning-items">
            {% for manning in area.manning_set.all %}
            <div class="d-flex align-items-center bg-light rounded-3 p-2 mb-2">
                <div
                    class="avatar-sm bg-{{ theme }} text-white rounded-circle me-2 d-flex align-items-center justify-content-center"
                    style="width: 20px; height: 20px; font-size: 0.75rem"
                >
                    {{ manning.worker_name|slice:":1" }}
                </div>
                <span class="fw-bold small flex-grow-1"
                    >{{ manning.worker_name }}</span
                >

                <div
                    class="d-flex align-items-center bg-white rounded-2 px-2 border"
                >
                    <input
                        type="number"
                        step="0.1"
                        name="manning_hours_{{ manning.id }}"
                        class="form-control form-control-sm border-0 bg-transparent text-end fw-bold text-{{ theme }} hour-input"
                        data-manning-id="{{ manning.id }}"
                        style="width: 5rem"
                        value="{{ manning.display_hours|default_if_none:manning.hours|floatformat:'1' }}"
                    />
                    <span
                        class="ms-1 small text-muted"
                        style="font-size: 0.7rem"
                        >H</span
                    >
                </div>
            </div>
            {% empty %}
            <div class="text-center py-3 border border-dashed rounded-3">
                <small class="text-muted">No one assigned yet</small>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
