<!-- 적용 방법
1. `base.html`에 로딩 오버레이 HTML 추가
2. `base.html`의 JavaScript에 페이지 이동 시 로딩 오버레이 표시 코드 추가    
3. 필요 시 개별 페이지나 폼에 `data-loading` 속성 추가하여 로딩 오버레이 자동 표시 기능 활용
4. 표시 방법
    - 폼에 `data-loding, data-loading-title, data-loading-text` 속성 추가
    - 현재 login.html, create_session.html, manage_items.html에서 적용된 예시 참고
    - 페이지 이동 시 자동으로 로딩 오버레이 표시 (모든 링크 클릭 시 표시하려면 `window.onbeforeunload` 주석 해제)
5. 로딩 오버레이는 `common-loader` ID를 가진 요소로, JavaScript에서 제어하여 표시/숨김 처리 
-->

<!-- 공통 로딩 오버레이 -->
<div id="common-loader" class="loading-overlay" style="display: none;">
    <div class="loader-content">
        <div class="spinner-grow text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
        <h4 id="loader-title" class="mt-4 fw-bold text-dark">데이터 처리 중</h4>
        <p id="loader-text" class="text-muted">잠시만 기다려 주세요.</p>
    </div>
</div>

<style>
    .loading-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(4px); /* 배경 살짝 흐리게 */
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .loader-content { text-align: center; }
</style>
