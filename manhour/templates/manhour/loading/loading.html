{% comment %} 사용 방법: 폼:
<form data-loading data-loading-title="..." data-loading-text="...">
버튼/링크: <button data-loading ...> 또는 <a data-loading ...>{% endcomment %}

<script
    defer
    src="https://cdn.jsdelivr.net/npm/sweetalert2@11"
></script>
<script>
    (function () {
        const defaultTitle = "처리 중";
        const defaultText = "잠시만 기다려 주세요";

        function showLoading(target) {
            if (!window.Swal) {
                return;
            }

            const title =
                target?.dataset?.loadingTitle || defaultTitle;
            const text =
                target?.dataset?.loadingText || defaultText;

            Swal.fire({
                title,
                text,
                width: "min(420px, 90vw)",
                padding: "2rem",
                background: "rgba(255,255,255,0.95)",
                color: "#1f2937",
                backdrop: "rgba(15, 23, 42, 0.45)",
                allowOutsideClick: false,
                allowEscapeKey: false,
                showConfirmButton: false,
                customClass: {
                    popup: "manning-loading-popup",
                    title: "manning-loading-title",
                    htmlContainer: "manning-loading-text",
                },
                didOpen: () => {
                    Swal.showLoading();
                },
            });
        }

        document.addEventListener("submit", (event) => {
            const form = event.target;
            if (form && form.matches("form[data-loading]")) {
                showLoading(form);
            }
        });

        document.addEventListener("click", (event) => {
            const target = event.target.closest("[data-loading]");
            if (!target || target.matches("form")) {
                return;
            }
            showLoading(target);
        });
    })();
</script>

<style>
    .manning-loading-popup {
        border-radius: 20px !important;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.22) !important;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    .manning-loading-title {
        font-weight: 700 !important;
        font-size: 1.25rem !important;
    }

    .manning-loading-text {
        font-size: 0.95rem !important;
        color: #64748b !important;
    }

    div:where(.swal2-container) .swal2-loader {
        width: 3rem !important;
        height: 3rem !important;
        border-width: 0.3em !important;
    }
</style>
